name: DeepClean Worker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deepclean-worker/**"
      - ".github/workflows/deepclean-worker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: deepclean-worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resmarke-deepclean:latest
            ghcr.io/${{ github.repository_owner }}/resmarke-deepclean:${{ github.sha }}
