<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ResMarke — strip metadata, remove visible AI marks, and seal your images. Private, instant, and entirely in your browser."
    />
    <meta name="theme-color" content="#06080d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbfcfe" media="(prefers-color-scheme: light)" />
    <title>ResMarke — Clean your images. Reclaim your privacy.</title>
    <script>
      // Set theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem("resmarke:theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
